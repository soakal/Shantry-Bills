app = "shantry-bills"
primary_region = "ord"

[build]

[env]
  DB_PATH = "/data/bills.db"

[[mounts]]
  source = "bills_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
