# fly.toml app configuration file generated for shantry-bills on 2026-07-10T15:04:56-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'shantry-bills'
primary_region = 'ord'

[build]
[env]
  DB_PATH = '/data/bills.db'

[[mounts]]
  source = 'bills_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
