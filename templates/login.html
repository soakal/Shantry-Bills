{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="card centered">
  <h1>Shantry Bills</h1>
  <form method="post">
    <input type="password" name="password" placeholder="Password" autofocus required>
    <button type="submit">Log in</button>
  </form>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
</div>
{% endblock %}
